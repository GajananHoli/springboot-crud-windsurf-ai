spring.application.name=spring-boot-jpa
# MySQL/JPA Configuration
spring.datasource.url=jdbc:mysql://localhost:3305/test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Table Auto-Creation Strategy (Set to 'update' or 'create')
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
